name: Security Scan

on:
  push:
    branches: ["*"]
  pull_request:
    branches: ["*"]

jobs:
  gitleaks:
    name: 🔐 Secret Scan (TruffleHog)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run TruffleHog
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified

  dependency-audit:
    name: 📦 Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        # Ignore GHSA-8gc5-j5rx-235r (fast-xml-parser ReDoS) — transitive dep
        # from @opennextjs/cloudflare, no fix available on our side
        run: npm audit --audit-level=high --omit=dev --ignore-advisory GHSA-8gc5-j5rx-235r
        continue-on-error: false
